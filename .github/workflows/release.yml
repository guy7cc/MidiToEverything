name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# This builds a self-contained single-file Windows exe and publishes a GitHub
# Release with two artifacts attached: a portable zip and a per-machine MSI installer.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for gh release create

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test MidiToEverything.sln --configuration Release

      - name: Publish self-contained single-file exe
        run: >
          dotnet publish src/App/App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.ver.outputs.version }}
          --output publish

      - name: Package portable zip
        shell: pwsh
        run: |
          $name = "MidiToEverything-${{ github.ref_name }}-win-x64"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item publish/MidiToEverything.exe "dist/$name/"
          Copy-Item README.md "dist/$name/"
          Copy-Item samples/config.sample.json "dist/$name/"
          # Per-language UI translation files (shipped next to the exe).
          Copy-Item publish/Resources "dist/$name/Resources" -Recurse
          Compress-Archive -Path "dist/$name/*" -DestinationPath "dist/$name.zip"

      - name: Build installer (MSI / WiX)
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.0
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          # MSI ProductVersion must be numeric — drop any prerelease suffix (e.g. 1.2.3-beta -> 1.2.3).
          $msiver = "${{ steps.ver.outputs.version }}".Split('-')[0]
          $out = "dist/MidiToEverything-${{ github.ref_name }}-win-x64.msi"
          wix build -arch x64 `
            -d Version=$msiver `
            -d PublishDir="${{ github.workspace }}\publish" `
            -o $out installer/Package.wxs
          if ($LASTEXITCODE -ne 0) { throw "wix build failed ($LASTEXITCODE)" }

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          zip="dist/MidiToEverything-${GITHUB_REF_NAME}-win-x64.zip"
          msi="dist/MidiToEverything-${GITHUB_REF_NAME}-win-x64.msi"
          prerelease=""
          case "${GITHUB_REF_NAME}" in *-*) prerelease="--prerelease";; esac
          gh release create "${GITHUB_REF_NAME}" "$zip" "$msi" \
            --title "MidiToEverything ${GITHUB_REF_NAME}" \
            --generate-notes $prerelease
