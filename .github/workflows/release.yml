name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# This builds a self-contained single-file Windows exe, zips it, and publishes a
# GitHub Release with auto-generated notes and the artifact attached.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for gh release create

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test MidiToEverything.sln --configuration Release

      - name: Publish self-contained single-file exe
        run: >
          dotnet publish src/App/App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.ver.outputs.version }}
          --output publish

      - name: Package artifact
        shell: pwsh
        run: |
          $name = "MidiToEverything-${{ github.ref_name }}-win-x64"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item publish/MidiToEverything.exe "dist/$name/"
          Copy-Item README.md "dist/$name/"
          Copy-Item samples/config.sample.json "dist/$name/"
          Compress-Archive -Path "dist/$name/*" -DestinationPath "dist/$name.zip"

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="dist/MidiToEverything-${GITHUB_REF_NAME}-win-x64.zip"
          prerelease=""
          case "${GITHUB_REF_NAME}" in *-*) prerelease="--prerelease";; esac
          gh release create "${GITHUB_REF_NAME}" "$asset" \
            --title "MidiToEverything ${GITHUB_REF_NAME}" \
            --generate-notes $prerelease
