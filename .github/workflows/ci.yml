name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore MidiToEverything.sln

      - name: Build
        run: dotnet build MidiToEverything.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MidiToEverything.sln --configuration Release --no-build --verbosity normal
